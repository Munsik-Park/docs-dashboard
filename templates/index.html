<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Docs Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --bg: #0d1117;
    --sidebar-bg: #161b22;
    --card-bg: #1c2128;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --purple: #d2a8ff;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, Roboto, 'Noto Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
}

.layout { display: flex; height: 100vh; }

/* Sidebar */
.sidebar {
    width: 320px; min-width: 320px;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; height: 100vh;
}
.sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
.sidebar-header h1 { font-size: 16px; color: var(--accent); margin-bottom: 4px; }
.sidebar-header p { font-size: 12px; color: var(--text-dim); }
.sidebar-actions {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    display: flex; gap: 8px;
}

.btn {
    padding: 6px 14px; border: 1px solid var(--border); background: var(--card-bg);
    color: var(--text); border-radius: 6px; cursor: pointer; font-size: 12px;
    font-family: inherit; transition: all 0.15s;
}
.btn:hover { background: #2d333b; border-color: var(--text-dim); }
.btn-primary { background: #238636; border-color: #2ea043; color: #fff; }
.btn-primary:hover { background: #2ea043; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.sidebar-nav { flex: 1; overflow-y: auto; padding: 8px 0; }

.cat-group { margin-bottom: 4px; }
.cat-header {
    padding: 8px 20px; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim);
    cursor: pointer; user-select: none; display: flex; align-items: center; gap: 6px;
}
.cat-header:hover { color: var(--text); }
.cat-header .arrow { font-size: 10px; transition: transform 0.2s; }
.cat-header.collapsed .arrow { transform: rotate(-90deg); }
.cat-items { padding: 0; }
.cat-items.hidden { display: none; }

.doc-item {
    display: flex; align-items: center; padding: 7px 20px 7px 28px;
    cursor: pointer; font-size: 13px; color: var(--text); gap: 8px;
    transition: background 0.1s; border-left: 3px solid transparent;
}
.doc-item:hover { background: rgba(88, 166, 255, 0.06); }
.doc-item.active {
    background: rgba(88, 166, 255, 0.1);
    border-left-color: var(--accent); color: #fff;
}

.sync-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.sync-synced { background: var(--green); }
.sync-outdated { background: var(--yellow); }
.sync-missing_html { background: var(--red); }
.sync-html_only { background: var(--purple); }
.sync-custom_html { background: var(--accent); }

.doc-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.doc-date { font-size: 11px; color: var(--text-dim); flex-shrink: 0; }

.sidebar-footer {
    padding: 12px 20px; border-top: 1px solid var(--border);
    font-size: 11px; color: var(--text-dim);
}
.legend-row { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* Main */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.main-toolbar {
    padding: 10px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
    background: var(--sidebar-bg); min-height: 48px;
}
.breadcrumb { font-size: 13px; color: var(--text-dim); }
.breadcrumb .current { color: var(--text); font-weight: 600; }
.toolbar-badges { margin-left: auto; display: flex; gap: 8px; align-items: center; }

.badge {
    font-size: 11px; padding: 2px 10px; border-radius: 12px;
    border: 1px solid var(--border); color: var(--text-dim);
}
.badge-md { border-color: #388bfd44; color: var(--accent); }
.badge-html { border-color: #3fb95044; color: var(--green); }

.viewer { flex: 1; background: #fff; overflow: hidden; }
.viewer iframe { width: 100%; height: 100%; border: none; }

.empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100%; color: var(--text-dim); background: var(--bg);
}
.empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }

.toast {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--card-bg); border: 1px solid var(--border);
    padding: 12px 20px; border-radius: 8px; font-size: 13px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3); z-index: 1000;
    transition: opacity 0.3s, transform 0.3s;
    opacity: 0; transform: translateY(10px);
}
.toast.show { opacity: 1; transform: translateY(0); }

.tab-bar { display: flex; gap: 0; }
.tab {
    padding: 6px 14px; font-size: 12px; cursor: pointer;
    border: 1px solid var(--border); background: var(--card-bg);
    color: var(--text-dim); font-family: inherit;
}
.tab:first-child { border-radius: 6px 0 0 6px; }
.tab:last-child { border-radius: 0 6px 6px 0; }
.tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.sidebar-nav::-webkit-scrollbar { width: 6px; }
.sidebar-nav::-webkit-scrollbar-track { background: transparent; }
.sidebar-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Top-level navigation tabs */
.top-tabs {
    display: flex; gap: 0; padding: 0 20px;
    border-bottom: 1px solid var(--border); background: var(--sidebar-bg);
}
.top-tab {
    padding: 10px 20px; font-size: 13px; cursor: pointer;
    color: var(--text-dim); border: none; background: none;
    font-family: inherit; font-weight: 500; position: relative;
    transition: color 0.15s;
}
.top-tab:hover { color: var(--text); }
.top-tab.active { color: var(--accent); }
.top-tab.active::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0;
    height: 2px; background: var(--accent); border-radius: 2px 2px 0 0;
}

/* Panel views */
.panel { display: none; flex: 1; overflow-y: auto; background: var(--bg); }
.panel.active { display: flex; flex-direction: column; }

/* Domain cards */
.domain-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px; padding: 24px;
}
.domain-card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 20px; cursor: pointer;
    transition: border-color 0.15s, transform 0.15s;
}
.domain-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.domain-card h3 { font-size: 16px; color: var(--text); margin-bottom: 12px; }
.domain-stat-row { display: flex; gap: 20px; margin-bottom: 12px; }
.domain-stat { text-align: center; }
.domain-stat .val { font-size: 22px; font-weight: 700; color: var(--accent); }
.domain-stat .lbl { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.domain-chart { width: 100%; height: 150px; }

/* Domain detail modal */
.modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    z-index: 900; align-items: center; justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px; width: 90%; max-width: 700px;
    max-height: 80vh; overflow-y: auto;
}
.modal h2 { font-size: 18px; margin-bottom: 16px; color: var(--text); }
.modal-close {
    float: right; background: none; border: none; color: var(--text-dim);
    font-size: 20px; cursor: pointer;
}
.modal-close:hover { color: var(--text); }

/* Taxonomy tree */
.taxonomy-container { flex: 1; padding: 24px; display: flex; flex-direction: column; }
.taxonomy-toolbar { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; }
.taxonomy-tree-wrapper { flex: 1; background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; min-height: 400px; }
.taxonomy-tree-wrapper svg { width: 100%; height: 100%; }
.tree-node circle { cursor: pointer; transition: fill 0.2s; }
.tree-node text { font-size: 12px; fill: var(--text); }
.tree-link { fill: none; stroke: var(--border); stroke-width: 1.5; }
.node-standard circle { fill: var(--accent); }
.node-discovered circle { fill: var(--yellow); }
.node-promoted circle { fill: var(--green); }

/* Node detail popup */
.node-detail {
    position: absolute; background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px; z-index: 100; min-width: 220px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4); display: none;
}
.node-detail.active { display: block; }
.node-detail h4 { font-size: 14px; margin-bottom: 8px; color: var(--text); }
.node-detail .meta { font-size: 12px; color: var(--text-dim); margin: 4px 0; }

/* Pending list */
.pending-list { margin-top: 16px; }
.pending-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 8px; margin-bottom: 8px;
}
.pending-item .name { flex: 1; font-size: 13px; color: var(--text); }
.pending-item .conf { font-size: 12px; color: var(--yellow); }

/* Quality panel */
.quality-container { padding: 24px; }
.quality-summary {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px; margin-bottom: 24px;
}
.quality-card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px; text-align: center;
}
.quality-card .val { font-size: 28px; font-weight: 700; color: var(--accent); }
.quality-card .lbl { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
.quality-charts { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.quality-chart-box {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 20px;
}
.quality-chart-box h3 { font-size: 14px; color: var(--text); margin-bottom: 12px; }
.quality-chart-box canvas { width: 100% !important; height: 300px !important; }

@media (max-width: 900px) {
    .quality-charts { grid-template-columns: 1fr; }
    .domain-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-header">
            <h1>Docs Dashboard</h1>
            <p id="project-name"></p>
        </div>
        <div class="top-tabs" id="top-tabs">
            <button class="top-tab active" data-tab="docs" onclick="switchTopTab('docs')">Docs</button>
            <button class="top-tab" data-tab="domains" onclick="switchTopTab('domains')" style="display:none">Domains</button>
            <button class="top-tab" data-tab="taxonomy" onclick="switchTopTab('taxonomy')" style="display:none">Taxonomy</button>
            <button class="top-tab" data-tab="quality" onclick="switchTopTab('quality')" style="display:none">Quality</button>
        </div>
        <div class="sidebar-actions" id="docs-sidebar-actions">
            <button class="btn btn-primary" id="btn-sync" onclick="syncAll()">Sync All</button>
            <button class="btn" onclick="refreshList()">Refresh</button>
        </div>
        <nav class="sidebar-nav" id="sidebar-nav"></nav>
        <div class="sidebar-footer" id="sidebar-footer">
            <div class="legend-row"><div class="legend-dot sync-synced"></div> Synced</div>
            <div class="legend-row"><div class="legend-dot sync-outdated"></div> HTML outdated</div>
            <div class="legend-row"><div class="legend-dot sync-missing_html"></div> HTML missing</div>
            <div class="legend-row"><div class="legend-dot sync-html_only"></div> HTML only</div>
            <div class="legend-row"><div class="legend-dot sync-custom_html"></div> Custom (skip sync)</div>
        </div>
    </aside>

    <main class="main">
        <!-- Docs panel (default) -->
        <div class="panel active" id="panel-docs" style="display:flex;flex-direction:column">
            <div class="main-toolbar" id="toolbar">
                <span class="breadcrumb" id="breadcrumb">Select a document</span>
                <div class="toolbar-badges" id="toolbar-badges"></div>
            </div>
            <div class="viewer" id="viewer" style="flex:1">
                <div class="empty-state">
                    <div class="icon">&#128196;</div>
                    <p>Click a document to view</p>
                </div>
            </div>
        </div>

        <!-- Domains panel -->
        <div class="panel" id="panel-domains">
            <div class="domain-grid" id="domain-grid"></div>
        </div>

        <!-- Taxonomy panel -->
        <div class="panel" id="panel-taxonomy">
            <div class="taxonomy-container">
                <div class="taxonomy-toolbar">
                    <h2 style="font-size:16px;color:var(--text)">Taxonomy Tree</h2>
                    <button class="btn" onclick="loadPendingNodes()" style="margin-left:auto">Pending Nodes</button>
                    <button class="btn" onclick="loadTaxonomyTree()">Refresh</button>
                </div>
                <div class="taxonomy-tree-wrapper" id="taxonomy-tree"></div>
                <div class="pending-list" id="pending-list"></div>
            </div>
            <div class="node-detail" id="node-detail"></div>
        </div>

        <!-- Quality panel -->
        <div class="panel" id="panel-quality">
            <div class="quality-container">
                <div class="quality-summary" id="quality-summary"></div>
                <div class="quality-charts">
                    <div class="quality-chart-box">
                        <h3>Confidence Distribution</h3>
                        <canvas id="chart-confidence"></canvas>
                    </div>
                    <div class="quality-chart-box">
                        <h3>Attribute Coverage by Domain</h3>
                        <canvas id="chart-coverage"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<div class="modal-overlay" id="domain-modal">
    <div class="modal">
        <button class="modal-close" onclick="closeDomainModal()">&times;</button>
        <h2 id="modal-domain-title"></h2>
        <div id="modal-domain-body"></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
let docs = [];
let currentDoc = null;
let viewMode = 'html';
let currentTab = 'docs';
let dbAvailable = false;
let chartConfidence = null;
let chartCoverage = null;
let domainCharts = [];
let domainStatsCache = {};
let nodeDetailCloseHandler = null;

const CHART_COLORS = ['#58a6ff','#3fb950','#d29922','#f85149','#d2a8ff','#79c0ff','#56d364','#e3b341','#ff7b72','#bc8cff'];
const CHART_SCALE_OPTS = {
    ticks: { color: '#8b949e' },
    grid: { color: '#30363d' }
};

// ---------------------------------------------------------------------------
// Helpers
// ---------------------------------------------------------------------------

function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
}

async function apiFetch(url, opts) {
    const res = await fetch(url, opts);
    if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
    return res.json();
}

function emptyStateHTML(msg) {
    return `<div class="empty-state" style="padding:60px"><p>${esc(msg)}</p></div>`;
}

function errorHTML(msg) {
    return `<div class="empty-state" style="padding:60px"><p style="color:var(--red)">${esc(msg)}</p></div>`;
}

function highlightDoc(stem) {
    document.querySelectorAll('.doc-item').forEach(el => {
        el.classList.toggle('active', el.dataset.stem === stem);
    });
}

function loadScript(src) {
    return new Promise((resolve, reject) => {
        if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
        const s = document.createElement('script');
        s.src = src; s.onload = resolve; s.onerror = reject;
        document.head.appendChild(s);
    });
}

// ---------------------------------------------------------------------------
// Top-level tab navigation
// ---------------------------------------------------------------------------

async function checkFeatures() {
    try {
        const data = await apiFetch('/api/features');
        dbAvailable = data.db_available;
    } catch { dbAvailable = false; }

    if (dbAvailable) {
        document.querySelectorAll('.top-tab[data-tab="domains"],.top-tab[data-tab="taxonomy"],.top-tab[data-tab="quality"]')
            .forEach(el => el.style.display = '');
    }
}

function switchTopTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.top-tab').forEach(el =>
        el.classList.toggle('active', el.dataset.tab === tab));

    document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
    const panel = document.getElementById('panel-' + tab);
    if (panel) panel.classList.add('active');

    const showDocsSidebar = tab === 'docs';
    document.getElementById('docs-sidebar-actions').style.display = showDocsSidebar ? '' : 'none';
    document.getElementById('sidebar-nav').style.display = showDocsSidebar ? '' : 'none';
    document.getElementById('sidebar-footer').style.display = showDocsSidebar ? '' : 'none';

    if (tab === 'domains') loadDomains();
    else if (tab === 'taxonomy') loadTaxonomyTree();
    else if (tab === 'quality') loadQuality();
}

// ---------------------------------------------------------------------------
// Config & Docs (existing)
// ---------------------------------------------------------------------------

async function loadConfig() {
    try {
        const cfg = await apiFetch('/api/config');
        const el = document.getElementById('project-name');
        el.textContent = cfg.project_name || '';
        if (cfg.project_name) {
            document.title = cfg.project_name + ' \u2014 Docs Dashboard';
        }
    } catch {}
}

async function fetchDocs() {
    docs = await apiFetch('/api/docs');
    return docs;
}

function groupByCategory(docs) {
    const groups = {};
    for (const doc of docs) {
        const cat = doc.category;
        if (!groups[cat]) groups[cat] = [];
        groups[cat].push(doc);
    }
    return Object.entries(groups).sort(([a], [b]) => a.localeCompare(b));
}

function renderSidebar(docs) {
    const nav = document.getElementById('sidebar-nav');
    const groups = groupByCategory(docs);
    nav.innerHTML = groups.map(([cat, items]) => `
        <div class="cat-group">
            <div class="cat-header" onclick="toggleGroup(this)">
                <span class="arrow">&#9660;</span>
                ${esc(cat)}
                <span style="margin-left:auto;font-size:11px;color:var(--text-dim)">${items.length}</span>
            </div>
            <div class="cat-items">
                ${items.map(doc => {
                    const name = doc.stem.split('/').pop();
                    const date = doc.html ? doc.html.mtime_str.slice(5) : (doc.md ? doc.md.mtime_str.slice(5) : '');
                    return `
                        <div class="doc-item" data-stem="${esc(doc.stem)}" onclick="selectDoc(this.dataset.stem)">
                            <div class="sync-dot sync-${esc(doc.sync)}"></div>
                            <span class="doc-name" title="${esc(doc.stem)}">${esc(name)}</span>
                            <span class="doc-date">${esc(date)}</span>
                        </div>`;
                }).join('')}
            </div>
        </div>
    `).join('');
}

function toggleGroup(header) {
    header.classList.toggle('collapsed');
    header.nextElementSibling.classList.toggle('hidden');
}

function selectDoc(stem) {
    currentDoc = docs.find(d => d.stem === stem);
    if (!currentDoc) return;

    highlightDoc(stem);

    const breadcrumb = document.getElementById('breadcrumb');
    const badges = document.getElementById('toolbar-badges');
    const displayName = stem.split('/').pop().replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());

    breadcrumb.innerHTML = `<span style="color:var(--text-dim)">${esc(currentDoc.category)} / </span><span class="current">${esc(displayName)}</span>`;

    let bh = '';
    if (currentDoc.md) bh += `<span class="badge badge-md">MD ${formatSize(currentDoc.md.size)}</span>`;
    if (currentDoc.html) bh += `<span class="badge badge-html">HTML ${formatSize(currentDoc.html.size)}</span>`;

    if (currentDoc.md && currentDoc.html) {
        bh += `<div class="tab-bar">
            <button class="tab ${viewMode === 'html' ? 'active' : ''}" onclick="switchView('html')">HTML</button>
            <button class="tab ${viewMode === 'md' ? 'active' : ''}" onclick="switchView('md')">MD</button>
        </div>`;
    }

    if (currentDoc.sync === 'outdated' || currentDoc.sync === 'missing_html') {
        bh += `<button class="btn btn-primary" onclick="syncOne('${esc(currentDoc.md.path)}')" style="font-size:11px;padding:4px 10px">Sync</button>`;
    }
    badges.innerHTML = bh;
    loadContent();
}

function switchView(mode) { viewMode = mode; if (currentDoc) selectDoc(currentDoc.stem); }

function loadContent() {
    const viewer = document.getElementById('viewer');
    if (!currentDoc) return;
    let path;
    if (viewMode === 'html' && currentDoc.html) path = currentDoc.html.path;
    else if (currentDoc.md) path = currentDoc.md.path;
    else if (currentDoc.html) path = currentDoc.html.path;
    else { viewer.innerHTML = emptyStateHTML('No viewable file'); return; }
    viewer.innerHTML = `<iframe src="/api/docs/view/${encodeURI(path)}"></iframe>`;
}

function formatSize(bytes) {
    if (bytes < 1024) return bytes + 'B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + 'KB';
    return (bytes / 1048576).toFixed(1) + 'MB';
}

async function syncAll() {
    const btn = document.getElementById('btn-sync');
    btn.disabled = true; btn.textContent = 'Syncing...';
    try {
        const data = await apiFetch('/api/docs/sync', { method: 'POST' });
        showToast(`${data.total} file(s) synced` + (data.errors.length ? `, ${data.errors.length} error(s)` : ''));
        await refreshList();
    } catch (e) { showToast('Sync failed: ' + e.message); }
    finally { btn.disabled = false; btn.textContent = 'Sync All'; }
}

async function syncOne(mdPath) {
    try {
        const data = await apiFetch(`/api/docs/sync/${mdPath}`, { method: 'POST' });
        showToast(`Synced: ${data.synced}`);
        await refreshList();
        if (currentDoc) selectDoc(currentDoc.stem);
    } catch (e) { showToast('Sync failed: ' + e.message); }
}

async function refreshList() {
    await fetchDocs();
    renderSidebar(docs);
    if (currentDoc) highlightDoc(currentDoc.stem);
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

// ---------------------------------------------------------------------------
// Domains
// ---------------------------------------------------------------------------

function destroyDomainCharts() {
    domainCharts.forEach(c => c.destroy());
    domainCharts = [];
}

async function loadDomains() {
    await loadScript('https://cdn.jsdelivr.net/npm/chart.js@4');
    const grid = document.getElementById('domain-grid');
    destroyDomainCharts();
    try {
        const domains = await apiFetch('/api/domains');
        if (!domains.length) { grid.innerHTML = emptyStateHTML('No domains registered'); return; }

        // Fetch all domain stats in parallel
        const statsResults = await Promise.all(domains.map(d =>
            apiFetch(`/api/domains/${encodeURIComponent(d.domain)}/stats`).catch(() => ({ categories: [] }))
        ));
        domains.forEach((d, i) => { domainStatsCache[d.domain] = statsResults[i]; });

        grid.innerHTML = domains.map((d, i) => `
            <div class="domain-card" data-domain="${esc(d.domain)}" onclick="openDomainDetail(this.dataset.domain)">
                <h3>${esc(d.domain)}</h3>
                <div class="domain-stat-row">
                    <div class="domain-stat"><div class="val">${d.product_count ?? 0}</div><div class="lbl">Products</div></div>
                    <div class="domain-stat"><div class="val">${d.category_count ?? 0}</div><div class="lbl">Categories</div></div>
                    <div class="domain-stat"><div class="val">${d.avg_attributes != null ? Number(d.avg_attributes).toFixed(1) : '-'}</div><div class="lbl">Avg Attrs</div></div>
                </div>
                <canvas id="donut-${i}" class="domain-chart"></canvas>
            </div>
        `).join('');

        domains.forEach((d, i) => {
            const cats = (domainStatsCache[d.domain]?.categories) || [];
            if (!cats.length) return;
            const canvas = document.getElementById('donut-' + i);
            if (!canvas) return;
            const chart = new Chart(canvas, {
                type: 'doughnut',
                data: {
                    labels: cats.map(c => c.category),
                    datasets: [{ data: cats.map(c => c.product_count), backgroundColor: CHART_COLORS.slice(0, cats.length) }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { position: 'right', labels: { color: '#8b949e', font: { size: 11 } } } }
                }
            });
            domainCharts.push(chart);
        });
    } catch (e) { grid.innerHTML = errorHTML('Failed to load domains: ' + e.message); }
}

function openDomainDetail(domain) {
    const modal = document.getElementById('domain-modal');
    document.getElementById('modal-domain-title').textContent = domain;
    const body = document.getElementById('modal-domain-body');
    const cached = domainStatsCache[domain];
    if (cached) {
        renderDomainModal(body, cached.categories || []);
    } else {
        body.innerHTML = '<p style="color:var(--text-dim)">Loading...</p>';
        apiFetch(`/api/domains/${encodeURIComponent(domain)}/stats`)
            .then(data => { domainStatsCache[domain] = data; renderDomainModal(body, data.categories || []); })
            .catch(e => { body.innerHTML = errorHTML(e.message); });
    }
    modal.classList.add('active');
}

function renderDomainModal(body, cats) {
    body.innerHTML = `
        <table style="width:100%;border-collapse:collapse;margin-top:12px">
            <tr style="border-bottom:1px solid var(--border)">
                <th style="text-align:left;padding:8px;color:var(--text-dim);font-size:12px">Category</th>
                <th style="text-align:right;padding:8px;color:var(--text-dim);font-size:12px">Products</th>
                <th style="text-align:right;padding:8px;color:var(--text-dim);font-size:12px">Avg Confidence</th>
            </tr>
            ${cats.map(c => `
                <tr style="border-bottom:1px solid var(--border)">
                    <td style="padding:8px;color:var(--text);font-size:13px">${esc(c.category)}</td>
                    <td style="text-align:right;padding:8px;color:var(--accent);font-size:13px">${c.product_count}</td>
                    <td style="text-align:right;padding:8px;color:var(--text-dim);font-size:13px">${c.avg_confidence != null ? Number(c.avg_confidence).toFixed(2) : '-'}</td>
                </tr>
            `).join('')}
        </table>`;
}

function closeDomainModal() {
    document.getElementById('domain-modal').classList.remove('active');
}

// ---------------------------------------------------------------------------
// Taxonomy
// ---------------------------------------------------------------------------

async function loadTaxonomyTree() {
    await loadScript('https://d3js.org/d3.v7.min.js');
    const wrapper = document.getElementById('taxonomy-tree');
    try {
        const nodes = await apiFetch('/api/taxonomy/tree');
        if (!nodes.length) { wrapper.innerHTML = emptyStateHTML('No taxonomy data'); return; }
        renderTree(nodes, wrapper);
    } catch (e) { wrapper.innerHTML = errorHTML('Failed to load: ' + e.message); }
}

function renderTree(nodes, container) {
    container.innerHTML = '';
    const width = container.clientWidth || 800;
    const height = Math.max(container.clientHeight || 500, nodes.length * 22);

    const nodeMap = new Map();
    const roots = [];
    for (const n of nodes) {
        nodeMap.set(n.id, { ...n, children: [] });
    }
    for (const n of nodes) {
        const node = nodeMap.get(n.id);
        if (n.parent_id && nodeMap.has(n.parent_id)) {
            nodeMap.get(n.parent_id).children.push(node);
        } else {
            roots.push(node);
        }
    }
    const root = roots.length === 1 ? roots[0] : { id: 0, name: 'Root', node_type: 'standard', children: roots };
    const hierarchy = d3.hierarchy(root);

    const treeLayout = d3.tree().size([height - 40, width - 200]);
    treeLayout(hierarchy);

    const svg = d3.select(container).append('svg')
        .attr('width', width).attr('height', height);
    const g = svg.append('g').attr('transform', 'translate(80, 20)');

    g.selectAll('.tree-link')
        .data(hierarchy.links())
        .join('path')
        .attr('class', 'tree-link')
        .attr('d', d3.linkHorizontal().x(d => d.y).y(d => d.x));

    const nodeG = g.selectAll('.tree-node')
        .data(hierarchy.descendants())
        .join('g')
        .attr('class', d => `tree-node node-${d.data.node_type || 'standard'}`)
        .attr('transform', d => `translate(${d.y},${d.x})`)
        .on('click', (event, d) => showNodeDetail(event, d.data));

    nodeG.append('circle').attr('r', 5);
    nodeG.append('text')
        .attr('dx', 10).attr('dy', 4)
        .text(d => d.data.name);
}

function showNodeDetail(event, data) {
    const detail = document.getElementById('node-detail');
    detail.innerHTML = `
        <h4>${esc(data.name)}</h4>
        <div class="meta">Type: <strong>${esc(data.node_type)}</strong></div>
        <div class="meta">Domain: ${esc(data.domain || '-')}</div>
        <div class="meta">Products: ${data.product_count ?? '-'}</div>
        ${data.confidence != null ? `<div class="meta">Confidence: ${Number(data.confidence).toFixed(2)}</div>` : ''}
        ${data.node_type === 'discovered' ? `<button class="btn btn-primary" style="margin-top:10px;font-size:12px" onclick="promoteNode(${Number(data.id)})">Promote</button>` : ''}
    `;
    detail.style.left = (event.pageX + 10) + 'px';
    detail.style.top = (event.pageY - 10) + 'px';
    detail.classList.add('active');

    if (nodeDetailCloseHandler) {
        document.removeEventListener('click', nodeDetailCloseHandler);
    }
    nodeDetailCloseHandler = (e) => {
        if (!detail.contains(e.target)) {
            detail.classList.remove('active');
            document.removeEventListener('click', nodeDetailCloseHandler);
            nodeDetailCloseHandler = null;
        }
    };
    setTimeout(() => document.addEventListener('click', nodeDetailCloseHandler), 10);
}

async function promoteNode(nodeId) {
    try {
        const data = await apiFetch(`/api/taxonomy/promote/${nodeId}`, { method: 'POST' });
        showToast(`Promoted: ${data.promoted.name}`);
        document.getElementById('node-detail').classList.remove('active');
        loadTaxonomyTree();
        loadPendingNodes();
    } catch (e) { showToast('Promote failed: ' + e.message); }
}

async function loadPendingNodes() {
    const list = document.getElementById('pending-list');
    try {
        const nodes = await apiFetch('/api/taxonomy/pending');
        if (!nodes.length) { list.innerHTML = '<p style="color:var(--text-dim);padding:8px">No pending nodes</p>'; return; }
        list.innerHTML = `<h3 style="font-size:14px;color:var(--text);margin-bottom:8px">Pending Promotion (${nodes.length})</h3>` +
            nodes.map(n => `
                <div class="pending-item">
                    <span class="name">${esc(n.name)} <span style="color:var(--text-dim);font-size:11px">(${esc(n.domain || '-')})</span></span>
                    <span class="conf">${n.confidence != null ? Number(n.confidence).toFixed(2) : '-'}</span>
                    <button class="btn btn-primary" style="font-size:11px;padding:3px 10px" onclick="promoteNode(${Number(n.id)})">Promote</button>
                </div>
            `).join('');
    } catch (e) { list.innerHTML = errorHTML(e.message); }
}

// ---------------------------------------------------------------------------
// Quality
// ---------------------------------------------------------------------------

async function loadQuality() {
    await loadScript('https://cdn.jsdelivr.net/npm/chart.js@4');
    try {
        const q = await apiFetch('/api/quality/overview');
        const summary = document.getElementById('quality-summary');
        summary.innerHTML = `
            <div class="quality-card"><div class="val">${q.total_products ?? '-'}</div><div class="lbl">Total Products</div></div>
            <div class="quality-card"><div class="val">${q.avg_confidence != null ? Number(q.avg_confidence).toFixed(2) : '-'}</div><div class="lbl">Avg Confidence</div></div>
            <div class="quality-card"><div class="val">${q.median_confidence != null ? Number(q.median_confidence).toFixed(2) : '-'}</div><div class="lbl">Median Confidence</div></div>
            <div class="quality-card"><div class="val">${q.avg_coverage != null ? (Number(q.avg_coverage) * 100).toFixed(0) + '%' : '-'}</div><div class="lbl">Avg Coverage</div></div>
            <div class="quality-card"><div class="val" style="color:var(--green)">${q.high_confidence_count ?? '-'}</div><div class="lbl">High Confidence</div></div>
            <div class="quality-card"><div class="val" style="color:var(--red)">${q.low_confidence_count ?? '-'}</div><div class="lbl">Low Confidence</div></div>
        `;
        renderConfidenceChart(q);
        renderCoverageChart();
    } catch (e) {
        document.getElementById('quality-summary').innerHTML = errorHTML('Failed to load quality data: ' + e.message);
    }
}

function renderConfidenceChart(overview) {
    const canvas = document.getElementById('chart-confidence');
    if (chartConfidence) chartConfidence.destroy();
    const buckets = ['0-0.2', '0.2-0.4', '0.4-0.6', '0.6-0.8', '0.8-1.0'];
    const data = [
        overview.bucket_0_02 || 0,
        overview.bucket_02_04 || 0,
        overview.bucket_04_06 || 0,
        overview.bucket_06_08 || 0,
        overview.bucket_08_10 || 0
    ];
    chartConfidence = new Chart(canvas, {
        type: 'bar',
        data: {
            labels: buckets,
            datasets: [{ label: 'Products', data, backgroundColor: CHART_COLORS.slice(0, 5) }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { x: CHART_SCALE_OPTS, y: CHART_SCALE_OPTS }
        }
    });
}

async function renderCoverageChart() {
    const canvas = document.getElementById('chart-coverage');
    if (chartCoverage) chartCoverage.destroy();
    try {
        const coverages = await apiFetch('/api/quality/coverage-by-domain');
        chartCoverage = new Chart(canvas, {
            type: 'bar',
            data: {
                labels: coverages.map(c => c.domain),
                datasets: [{ label: 'Avg Coverage', data: coverages.map(c => (Number(c.avg_coverage || 0) * 100).toFixed(1)), backgroundColor: '#58a6ff' }]
            },
            options: {
                indexAxis: 'y', responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { max: 100, ticks: { color: '#8b949e', callback: v => v + '%' }, grid: { color: '#30363d' } },
                    y: CHART_SCALE_OPTS
                }
            }
        });
    } catch {}
}
